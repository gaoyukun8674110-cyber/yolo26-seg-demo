# nginx config for the YOLO26 web showcase container.
# Serves the static SPA and proxies API paths to the backend service.
# In docker-compose the backend is reachable at http://api:8000.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API endpoints to the FastAPI backend container.
    # Keep this list in sync with web/vite.config.ts proxy targets.
    location /health   { proxy_pass http://api:8000; }
    location /metrics  { proxy_pass http://api:8000; }
    location /examples { proxy_pass http://api:8000; }
    location /predict  {
        proxy_pass http://api:8000;
        # Uploaded images can be a few MB; raise the body limit.
        client_max_body_size 25m;
    }
    location /artifacts {
        proxy_pass http://api:8000;
    }
}
